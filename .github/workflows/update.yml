name: Meow VPN Auto Update

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download source
        run: |
          curl -fLsS -o original.txt https://raw.githubusercontent.com/GoldCaviar/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt

      - name: Build VPN list
        run: |
          grep -v '^#' original.txt | grep -v '^$' > clean.txt

          COUNT=$(wc -l < clean.txt)
          DATE=$(date +"%d.%m.%Y")
          TIME=$(date +"%H:%M")
          VERSION="v$((RANDOM%9+1)).$((RANDOM%10)).$((RANDOM%10))"

          {
            echo "# profile-title: 🔥M3owMeres VPN | WHITE LIST | $VERSION"
            echo "# update: $DATE $TIME"
            echo "# servers: $COUNT"
            echo ""

            while read line; do
              if echo "$line" | grep -qi "ru"; then
                echo "$line # 🇷🇺"
              elif echo "$line" | grep -qi "us"; then
                echo "$line # 🇺🇸"
              elif echo "$line" | grep -qi "de"; then
                echo "$line # 🇩🇪"
              elif echo "$line" | grep -qi "nl"; then
                echo "$line # 🇳🇱"
              else
                echo "$line # 🌍"
              fi
            done < clean.txt

          } > white-list.txt

      - name: Commit changes
        run: |
          git config user.name "meow-bot"
          git config user.email "meow@vpn.com"

          git add white-list.txt

          git commit -m "🔥 Auto update VPN list" || exit 0

      - name: Force push (FIX ALL ERRORS)
        run: |
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
