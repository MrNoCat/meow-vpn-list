name: "@meowmeres 🏳️WHITE LISTS🏳️"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download source
        run: |
          curl -fLsS -o original.txt https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt

      - name: Build SMART whitelist
        run: |
          export TZ=Europe/Moscow
          mkdir -p public

          # =========================
          # CLEAN
          # =========================
          grep -v '^#' original.txt \
          | grep -v '^$' \
          | tr -d '\r' \
          | sed 's/[[:space:]]//g' > clean.txt

          # =========================
          # VALID DOMAINS ONLY
          # =========================
          grep -E '^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$' clean.txt > domains.txt

          # =========================
          # BASE DOMAIN NORMALIZATION
          # =========================
          awk -F. '{if (NF>=2) print $(NF-1)"."$NF}' domains.txt \
          | sort -u > base.txt

          # =========================
          # 🟢 DIRECT (RU + LOCAL + FINANCE)
          # =========================
          grep -E 'yandex|vk|mail|sber|tinkoff|ozon|wildberries|gosuslugi|avito' base.txt > direct.txt || true

          # =========================
          # 🔵 PROXY (GLOBAL)
          # =========================
          grep -viE 'yandex|vk|mail|sber|tinkoff|ozon|wildberries|gosuslugi|avito' base.txt > proxy.txt

          # =========================
          # CLEAN ADS/TRACKERS
          # =========================
          grep -viE 'ads|analytics|tracker|doubleclick|googleadservices' proxy.txt > proxy_clean.txt

          # =========================
          # MERGE SMART ORDER
          # =========================
          {
            echo "# DIRECT"
            cat direct.txt
            echo ""
            echo "# PROXY"
            cat proxy_clean.txt
          } > smart.txt

          # =========================
          # LIMITS (MOBILE OPTIMIZED)
          # =========================
          head -n 4000 smart.txt > full.txt
          head -n 1200 smart.txt > lite.txt

          # =========================
          # OUTPUT PROTECTION
          # =========================
          if [ ! -s full.txt ]; then
            echo "EMPTY LIST" > public/white-list.txt
            exit 0
          fi

          # =========================
          # METADATA
          # =========================
          DATE=$(date +"%d.%m.%Y")
          TIME=$(date +"%H:%M")
          COUNT=$(wc -l < full.txt)

          {
            echo "# profile-title: @meowmeres 🏳️WHITE LISTS🏳️"
            echo "# mode: VPN-GRADE AUTO ROUTING"
            echo "# update: $DATE $TIME (MSK)"
            echo "# domains: $COUNT"
            echo ""
            cat full.txt
          } > public/white-list.txt

          cp lite.txt public/lite.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
