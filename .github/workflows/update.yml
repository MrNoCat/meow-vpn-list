name: Meow VPN Auto Pages Build

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download source
        run: |
          curl -fLsS -o original.txt https://raw.githubusercontent.com/GoldCaviar/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt

      - name: Build file
        run: |
          grep -v '^#' original.txt | grep -v '^$' > clean.txt

          COUNT=$(wc -l < clean.txt)
          DATE=$(date +"%d.%m.%Y")
          TIME=$(date +"%H:%M")
          VERSION="v$((RANDOM%9+1)).$((RANDOM%10)).$((RANDOM%10))"

          {
            echo "# profile-title: 🔥M3owMeres VPN | CLEAN | $VERSION"
            echo "# update: $DATE $TIME"
            echo "# servers: $COUNT"
            echo "# source: Happ / V2rayTun"
            echo ""

            cat clean.txt

          } > white-list.txt

      - name: Publish to repo (no git conflicts)
        run: |
          mkdir -p public
          cp white-list.txt public/white-list.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
