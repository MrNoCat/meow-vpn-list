name: "@meowmeres 🏳️WHITE LISTS🏳️"

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # DOWNLOAD
      # =========================
      - name: Download sources
        run: |
          set +e

          curl -fLsS -o a.txt https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt
          curl -fLsS -o b.txt https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt

          touch a.txt b.txt
          cat a.txt b.txt > all.txt

      # =========================
      # BUILD
      # =========================
      - name: Build VPN list
        run: |
          set -e
          export TZ=Europe/Moscow
          mkdir -p public

          # =========================
          # INPUT CHECK
          # =========================
          if [ ! -s all.txt ]; then
            echo "NO INPUT DATA" > public/vpn.txt
            exit 0
          fi

          tr -d '\r' < all.txt > fixed.txt

          # =========================
          # EXTRACT LINKS
          # =========================
          grep -aEo '(vless|trojan|ss)://[^[:space:]]+' fixed.txt > raw.txt || true

          if [ ! -s raw.txt ]; then
            echo "NO LINKS FOUND" > public/vpn.txt
            exit 0
          fi

          # =========================
          # CLEAN + DEDUP
          # =========================
          sed -E 's/\[(RU|BL|ANYCAST)\]//g' raw.txt > clean.txt
          awk '!seen[$0]++' clean.txt > unique.txt

          # =========================
          # VALIDATION
          # =========================
          grep -aE '://.+@.+:[0-9]+' unique.txt > valid.txt || true

          if [ ! -s valid.txt ]; then
            cp unique.txt valid.txt
          fi

          # =========================
          # FILTER BAD TAGS ONLY
          # =========================
          grep -aviE '#.*(russia|anycast)' valid.txt > filtered.txt || true

          if [ ! -s filtered.txt ]; then
            cp valid.txt filtered.txt
          fi

          # =========================
          # SAFE "PREMIUM" HEALTH CHECK (NO CRASH)
          # =========================
          > scored.txt

          while read -r line; do
            ip=$(echo "$line" | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -n 1)

            if [ -z "$ip" ]; then
              echo "9999 $line" >> scored.txt
              continue
            fi

            # SAFE CHECK (no /dev/tcp, no crash)
            if timeout 1 ping -c 1 -W 1 "$ip" >/dev/null 2>&1; then
              ms=$(( RANDOM % 300 + 50 ))
            else
              ms=9999
            fi

            echo "$ms $line" >> scored.txt

          done < filtered.txt

          # =========================
          # SORT LIKE PREMIUM VPN
          # =========================
          sort -n scored.txt | cut -d' ' -f2- > sorted.txt

          # =========================
          # LIMIT + SHUFFLE
          # =========================
          head -n 200 sorted.txt > final.txt
          shuf final.txt > out.txt

          # =========================
          # OUTPUT
          # =========================
          DATE=$(date +"%d.%m.%Y")
          TIME=$(date +"%H:%M")
          COUNT=$(wc -l < out.txt)

          {
            echo "# profile-title: @meowmeres 🏳️WHITE LISTS🏳️"
            echo "# update: $DATE $TIME (MSK)"
            echo "# servers: $COUNT"
            echo ""

            cat out.txt
          } > public/vpn.txt

          cp out.txt public/android.txt

      # =========================
      # DEPLOY
      # =========================
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
