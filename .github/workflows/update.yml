name: VPN Auto Detect Build

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download source
        run: |
          curl -fLsS -o original.txt https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS.txt

      - name: Build VPN list
        run: |
          set -euo pipefail

          export TZ=Europe/Moscow
          mkdir -p public

          # =========================
          # FIX CRLF
          # =========================
          tr -d '\r' < original.txt > fixed.txt

          # =========================
          # REMOVE EMPTY LINES
          # =========================
          grep -v '^$' fixed.txt > clean.txt || true

          [ -s clean.txt ] || { echo "EMPTY INPUT" > public/vpn.txt; exit 0; }

          # =========================
          # REMOVE [BL] AND [RU]
          # =========================
          sed -E 's/[[:space:]]*\[(BL|RU)\][[:space:]]*//g' clean.txt > no_tags.txt

          # =========================
          # KEEP ONLY VPN LINKS
          # =========================
          grep -E '^vless://|^trojan://|^ss://' no_tags.txt > vpn.txt || true

          [ -s vpn.txt ] || { echo "NO VPN LINKS" > public/vpn.txt; exit 0; }

          # =========================
          # REMOVE DUPLICATES
          # =========================
          awk '!seen[$0]++' vpn.txt > unique.txt

          # =========================
          # LIMIT FOR MOBILE STABILITY
          # =========================
          head -n 300 unique.txt > limited.txt

          # =========================
          # RANDOMIZE
          # =========================
          shuf limited.txt > final.txt

          DATE=$(date +"%d.%m.%Y")
          TIME=$(date +"%H:%M")
          COUNT=$(wc -l < final.txt)

          # =========================
          # OUTPUT
          # =========================
          {
            echo "# profile-title: 🔥MeowMeres VPN"
            echo "# Date/Time: $DATE $TIME (MSK)"
            echo "# Servers: $COUNT"
            echo ""
            cat final.txt
          } > public/vpn.txt

          cp final.txt public/android.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
