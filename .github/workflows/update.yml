name: "@meowmeres рџЏіпёЏWHITE LISTSрџЏіпёЏ"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download source
        run: |
          curl -fLsS -o original.txt https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt

      - name: Build smart whitelist
        run: |
          set -euo pipefail

          export TZ=Europe/Moscow
          mkdir -p public

          # =========================
          # CLEAN INPUT
          # =========================
          grep -v '^#' original.txt \
          | grep -v '^$' \
          | tr -d '\r' \
          | sed 's/[[:space:]]//g' > clean.txt || true

          # Р·Р°С‰РёС‚Р°
          [ -s clean.txt ] || { echo "EMPTY INPUT" > public/white-list.txt; exit 0; }

          # =========================
          # VALID DOMAINS ONLY
          # =========================
          grep -E '^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$' clean.txt > domains.txt || true

          [ -s domains.txt ] || { echo "NO DOMAINS" > public/white-list.txt; exit 0; }

          # =========================
          # NORMALIZE DOMAIN
          # =========================
          sed -E 's/^.*\.([a-zA-Z0-9-]+\.[a-zA-Z0-9-]+)$/\1/' domains.txt \
          | sort -u > base.txt || true

          [ -s base.txt ] || { echo "EMPTY BASE" > public/white-list.txt; exit 0; }

          # =========================
          # DIRECT / PROXY LOGIC
          # =========================
          DIRECT_PATTERNS="yandex|vk|mail|sber|tinkoff|ozon|wildberries|gosuslugi|avito"

          grep -Ei "$DIRECT_PATTERNS" base.txt > direct.txt || true
          grep -Eiv "$DIRECT_PATTERNS" base.txt > proxy.txt || true

          # =========================
          # CLEAN PROXY NOISE
          # =========================
          grep -viE 'ads|analytics|tracker|doubleclick|googlesyndication|metrics' proxy.txt > proxy_clean.txt || true

          # =========================
          # MERGE + DEDUP
          # =========================
          cat direct.txt proxy_clean.txt | sort -u > smart.txt || true

          [ -s smart.txt ] || { echo "EMPTY LIST" > public/white-list.txt; exit 0; }

          # =========================
          # FINAL VALIDATION
          # =========================
          grep -E '^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$' smart.txt > final.txt || true

          [ -s final.txt ] || { echo "EMPTY FINAL" > public/white-list.txt; exit 0; }

          # =========================
          # OUTPUT
          # =========================
          DATE=$(date +"%d.%m.%Y")
          TIME=$(date +"%H:%M")
          COUNT=$(wc -l < final.txt)

          {
            echo "# profile-title: @meowmeres рџЏіпёЏWHITE LISTSрџЏіпёЏ"
            echo "# mode: STABLE ROUTING"
            echo "# update: $DATE $TIME (MSK)"
            echo "# domains: $COUNT"
            echo ""
            echo "# DIRECT"
            cat direct.txt | sort -u || true
            echo ""
            echo "# PROXY"
            cat proxy_clean.txt | sort -u || true
          } > public/white-list.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
