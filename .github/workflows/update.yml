name: "@meowmeres рџЏіпёЏWHITE LISTSрџЏіпёЏ"

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # DOWNLOAD (FIXED RAW URLS)
      # =========================
      - name: Download whitelist sources
        run: |
          set +e

          curl -fLsS -o a.txt https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt || true
          curl -fLsS -o b.txt https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt || true

          touch a.txt b.txt
          cat a.txt b.txt > all.txt

      # =========================
      # BUILD
      # =========================
      - name: Build whitelist VPN list
        run: |
          set +e
          export TZ=Europe/Moscow
          mkdir -p public

          # =========================
          # INPUT CHECK
          # =========================
          if [ ! -s all.txt ]; then
            echo "NO INPUT DATA" > public/vpn.txt
            exit 0
          fi

          tr -d '\r' < all.txt > fixed.txt

          # =========================
          # EXTRACT LINKS
          # =========================
          grep -aEo '(vless|trojan|ss)://[^[:space:]]+' fixed.txt > raw.txt

          if [ ! -s raw.txt ]; then
            echo "NO LINKS FOUND" > public/vpn.txt
            exit 0
          fi

          # =========================
          # CLEAN + DEDUP
          # =========================
          sed -E 's/\[(RU|BL|ANYCAST)\]//g' raw.txt > clean.txt
          awk '!seen[$0]++' clean.txt > unique.txt

          # =========================
          # VALIDATION
          # =========================
          grep -aE '://.+@.+:[0-9]+' unique.txt > valid.txt

          if [ ! -s valid.txt ]; then
            cp unique.txt valid.txt
          fi

          # =========================
          # WHITELIST MODE (NO FILTER)
          # =========================
          cp valid.txt filtered.txt

          # =========================
          # SAFE SCORING (NO CRASH)
          # =========================
          > scored.txt

          while read -r line; do
            ip=$(echo "$line" | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -n 1)

            if [ -z "$ip" ]; then
              echo "9999 $line" >> scored.txt
              continue
            fi

            if timeout 1 ping -c 1 -W 1 "$ip" >/dev/null 2>&1; then
              ms=$(( RANDOM % 200 + 50 ))
            else
              ms=9999
            fi

            echo "$ms $line" >> scored.txt
          done < filtered.txt

          # fallback safety
          if [ ! -s scored.txt ]; then
            cp filtered.txt scored.txt
          fi

          # =========================
          # SORT (PREMIUM STYLE)
          # =========================
          sort -n scored.txt | cut -d' ' -f2- > sorted.txt

          # =========================
          # LIMIT + SHUFFLE
          # =========================
          head -n 250 sorted.txt > out.txt
          shuf out.txt > final.txt

          # =========================
          # OUTPUT
          # =========================
          DATE=$(date +"%d.%m.%Y")
          TIME=$(date +"%H:%M")
          COUNT=$(wc -l < final.txt)

          {
            echo "# profile-title: @meowmeres рџЏіпёЏWHITE LISTSрџЏіпёЏ"
            echo "# update: $DATE $TIME (MSK)"
            echo "# servers: $COUNT"
            echo "# mode: whitelist-stable"
            echo ""
            cat final.txt
          } > public/vpn.txt

          cp final.txt public/android.txt

      # =========================
      # DEPLOY
      # =========================
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
