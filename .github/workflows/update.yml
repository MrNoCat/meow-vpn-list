name: "@meowmeres рџЏіпёЏWHITE LISTSрџЏіпёЏ"

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # BUILD VPN LIST
      # =========================
      - name: Build VPN list
        shell: bash
        run: |
          set -euo pipefail
          export TZ=Europe/Moscow

          mkdir -p public
          workdir="$(mktemp -d)"

          cleanup() {
            rm -rf "$workdir"
          }

          trap cleanup EXIT

          # =========================
          # FILES
          # =========================
          A="$workdir/a.txt"
          B="$workdir/b.txt"
          ALL="$workdir/all.txt"
          FIXED="$workdir/fixed.txt"
          RAW="$workdir/raw.txt"
          CLEAN="$workdir/clean.txt"
          VALID="$workdir/valid.txt"
          FILTERED="$workdir/filtered.txt"
          SCORED="$workdir/scored.txt"
          SORTED="$workdir/sorted.txt"
          FINAL="$workdir/final.txt"

          # =========================
          # DOWNLOAD
          # =========================
          echo "[+] Downloading sources..."

          curl -fsSL --retry 3 --connect-timeout 10 \
            -o "$A" \
            https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt

          curl -fsSL --retry 3 --connect-timeout 10 \
            -o "$B" \
            https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt

          cat "$A" "$B" > "$ALL"

          if [ ! -s "$ALL" ]; then
            echo "NO INPUT DATA" > public/white-list.txt
            exit 0
          fi

          # =========================
          # FIX WINDOWS LINES
          # =========================
          tr -d '\r' < "$ALL" > "$FIXED"

          # =========================
          # EXTRACT LINKS
          # =========================
          echo "[+] Extracting links..."

          grep -aEo '(vless|trojan|ss)://[^[:space:]]+' "$FIXED" > "$RAW" || true

          if [ ! -s "$RAW" ]; then
            echo "NO LINKS FOUND" > public/white-list.txt
            exit 0
          fi

          # =========================
          # CLEAN TAGS + DEDUP
          # =========================
          echo "[+] Cleaning..."

          sed -E 's/\[(RU|BL|ANYCAST)\]//g' "$RAW" \
            | sort -u > "$CLEAN"

          # =========================
          # BASIC VALIDATION
          # =========================
          echo "[+] Validating..."

          grep -aE '://.+@.+:[0-9]+' "$CLEAN" > "$VALID" || true

          if [ ! -s "$VALID" ]; then
            cp "$CLEAN" "$VALID"
          fi

          # =========================
          # FILTER BAD TAGS
          # =========================
          grep -aviE '(russia|anycast)' "$VALID" > "$FILTERED" || true

          if [ ! -s "$FILTERED" ]; then
            cp "$VALID" "$FILTERED"
          fi

          # =========================
          # SIMPLE HEALTH SCORE
          # =========================
          echo "[+] Checking servers..."

          > "$SCORED"

          while read -r line; do

            host=$(echo "$line" \
              | sed -nE 's#.*@([^:/?]+).*#\1#p' \
              | head -n 1)

            if [ -z "$host" ]; then
              echo "9999|$line" >> "$SCORED"
              continue
            fi

            if timeout 2 ping -c 1 -W 1 "$host" >/dev/null 2>&1; then
              score=1
            else
              score=9999
            fi

            echo "$score|$line" >> "$SCORED"

          done < "$FILTERED"

          # =========================
          # SORT + LIMIT
          # =========================
          sort -n "$SCORED" \
            | cut -d'|' -f2- \
            | awk '!seen[$0]++' \
            | head -n 200 > "$SORTED"

          cp "$SORTED" "$FINAL"

          # =========================
          # OUTPUT
          # =========================
          DATE=$(date +"%d.%m.%Y")
          TIME=$(date +"%H:%M")
          COUNT=$(wc -l < "$FINAL")

          {
            echo "# profile-title: @meowmeres рџЏіпёЏWHITE LISTSрџЏіпёЏ"
            echo "# update: $DATE $TIME (MSK)"
            echo "# servers: $COUNT"
            echo ""
            cat "$FINAL"
          } > public/white-list.txt

          cp "$FINAL" public/android.txt

          echo "[+] Done. Total servers: $COUNT"

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
