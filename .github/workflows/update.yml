name: Meow VPN Auto Build

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download source
        run: |
          curl -fLsS -o original.txt https://raw.githubusercontent.com/GoldCaviar/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt

      - name: Build VPN list
        run: |
          grep -v '^#' original.txt | grep -v '^$' > clean.txt

          COUNT=$(wc -l < clean.txt)
          DATE=$(date +"%d.%m.%Y")
          TIME=$(date +"%H:%M")
          VERSION="v$((RANDOM%9+1)).$((RANDOM%10)).$((RANDOM%10))"

          {
            echo "# profile-title: 🔥M3owMeres VPN | CLEAN | $VERSION"
            echo "# compatible: Happ / V2rayTun"
            echo "# update: $DATE $TIME"
            echo "# servers: $COUNT"
            echo ""

            cat clean.txt

          } > white-list.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-list
          path: white-list.txt
