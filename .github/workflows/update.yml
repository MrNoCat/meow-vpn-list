name: "@meowmeres 🏳️WHITE LISTS🏳️"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download VPN list
        run: |
          curl -fLsS -o original.txt https://raw.githubusercontent.com/GoldCaviar/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt

      - name: Build VPN file (MSK time)
        run: |
          export TZ=Europe/Moscow

          grep -v '^#' original.txt | grep -v '^$' > clean.txt

          COUNT=$(wc -l < clean.txt)
          DATE=$(date +"%d.%m.%Y")
          TIME=$(date +"%H:%M")

          VERSION="v$((RANDOM%9+1)).$((RANDOM%10)).$((RANDOM%10))"

          mkdir -p public

          {
            echo "# profile-title: @meowmeres 🏳️WHITE LISTS🏳️"
            echo "# compatible: Happ / V2rayTun"
            echo "# update: $DATE $TIME (MSK)"
            echo "# servers: $COUNT"
            echo ""

            cat clean.txt

          } > public/white-list.txt

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
